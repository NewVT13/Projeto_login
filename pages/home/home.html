<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="../../styles/reset.css" />
    <link rel="stylesheet" href="../../styles/main.css" />
    <style>
      body {
        background-color: antiquewhite;
      }
      .conteiner_cartas {
        display: flex;
        flex-direction: column;
      }
      .conteiner_imagem {
        background-color: #ffe739;
        width: 100%;
        display: flex;
        justify-content: center;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
      }
      .conteiner_imagem img {
        width: 175px;
        padding: 0 10px;
      }
      .conteiner_descricao {
        padding: 10px;
        background-color: #fff;
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-end-start-radius: 8px;
        border-end-end-radius: 8px;
      }
      .conteiner_descricao h3 {
        font-size: 20px;
        font-weight: bold;
      }
      .conteiner_descricao p {
        font-size: 14px;
      }
      .conteiner_preco p {
        font-size: 20px;
        margin-top: 20px;
        color: #ffe739;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .conteiner_preco button {
        background-color: #181d36;
        color: #fff;
        border-radius: 4px;
        padding: 10px;
        border: none;
        text-align: center;
      }
      .conteiner_preco button:hover {
        transform: scale(1.05, 1.05);
        font-weight: bold;
      }
      .conteiner_produtos {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        width: 80%;
        margin: 40px auto;
        justify-content: space-between;
        max-width: 900px;
      }
    </style>
  </head>
  <body>
    <div class="conteiner_principal">
      <h1>Bem-vindo à GeekShop</h1>
      <p>Encontre as melhores cartas colecionáveis para sua coleção</p>
      <button>Explorar</button>
    </div>

    <h2 class="titulo_secundario">Cartas Disponíveis</h2>

    <div class="conteiner_produtos" id="lista"></div>

    <script src="home.js"></script>
    <script src="../../scripts/menu.js"></script>
  </body>
</html>
