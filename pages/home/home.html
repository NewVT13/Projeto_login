<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link rel="stylesheet" href="../../styles/reset.css" />
    <link rel="stylesheet" href="../../styles/main.css" />
    <style>
      body {
        background-color: antiquewhite;
      }
      .menu {
        width: 100%;
        height: 64px;
        background-color: #181d36;
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .logo_name {
        font-size: 24px;
        font-weight: bold;
        color: #ffe739;
      }
      .menu ul {
        display: flex;
        gap: 10px;
        color: #fff;
        font-size: 18px;
      }
      .carrinho_icone_conteiner {
        width: 50px;
        height: 50px;
        background-color: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        border-radius: 50%;
      }
      .conteiner_direita_menu {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .conteiner_cartas {
        display: flex;
        flex-direction: column;
      }
      .conteiner_imagem {
        background-color: #ffe739;
        width: 100%;
        display: flex;
        justify-content: center;
        border-top-left-radius: 8px;
        border-top-right-radius: 8px;
      }
      .conteiner_imagem img {
        width: 175px;
        padding: 0 10px;
      }
      .conteiner_descricao {
        padding: 10px;
        background-color: #fff;
        display: flex;
        flex-direction: column;
        gap: 10px;
        border-end-start-radius: 8px;
        border-end-end-radius: 8px;
      }
      .conteiner_descricao h3 {
        font-size: 20px;
        font-weight: bold;
      }
      .conteiner_descricao p {
        font-size: 14px;
      }
      .conteiner_preco p {
        font-size: 20px;
        margin-top: 20px;
        color: #ffe739;
        font-weight: bold;
        margin-bottom: 10px;
      }
      .conteiner_preco button {
        background-color: #181d36;
        color: #fff;
        border-radius: 4px;
        padding: 10px;
        border: none;
        text-align: center;
      }
      .conteiner_preco button:hover {
        transform: scale(1.05, 1.05);
        font-weight: bold;
      }
      .conteiner_produtos {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        width: 80%;
        margin: 40px auto;
        justify-content: space-between;
        max-width: 900px;
      }
    </style>
  </head>
  <body>
    <div class="menu">
      <h1 class="logo_name">GeekShop</h1>
      <div class="conteiner_direita_menu">
        <ul>
          <li>Produtos</li>
          <li>Sobre</li>
          <li>Contato</li>
        </ul>
        <div class="carrinho_icone_conteiner">
          <img src="../../imagens/cart.svg" alt="" />
        </div>
      </div>
    </div>
    <div class="conteiner_principal">
      <h1>Bem-vindo à GeekShop</h1>
      <p>Encontre as melhores cartas colecionáveis para sua coleção</p>
      <button>Explorar</button>
    </div>

    <h2 class="titulo_secundario">Cartas Disponíveis</h2>

    <div class="conteiner_produtos" id="lista">
      <div class="conteiner_cartas">
        <div class="conteiner_imagem">
          <img
            src="https://repositorio.sbrauble.com/arquivos/in/pokemon_bkp/cd/738/6924ac1ff1bb1-8t6ug-w0jnu-6386cdd1635c69bcd3f1e8f5ea9c84f1.jpg"
            alt="mega charizard card"
          />
        </div>
        <div class="conteiner_descricao">
          <h3>Mega Charizard X</h3>
          <p>Ultra rara</p>
          <p>Charizard preto com azul</p>
          <div class="conteiner_preco">
            <p>Preço: R$200,00</p>
            <button>Adicionar ao carrinho</button>
          </div>
        </div>
      </div>
    </div>

    <script src="home.js"></script>
  </body>
</html>
