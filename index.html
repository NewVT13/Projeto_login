<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <form id="form_login" class="conteiner_login">
      <h1 class="login_texto">Login</h1>
      <input
        class="input"
        id="email"
        type="email"
        placeholder="Email"
        required
      />
      <input
        class="input"
        id="senha"
        type="password"
        placeholder="Senha"
        required
      />
      <span id="senha_invalida"></span>
      <div class="conteiner_checkbox">
        <input type="checkbox" id="exibir_senha" onclick="exibirSenha()" />
        <label for="exibir_senha">Exibir senha</label>
      </div>
      <button class="button_login" type="submit">ENTRAR</button>
      <p>Ainda não tem conta? <a href="#">Crie agora</a></p>
    </form>
    <script src="index.js"></script>
  </body>
</html>
